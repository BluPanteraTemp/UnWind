# Node.js with React
# Build the Vite frontend from its project directory.

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm ci
    npm run build
  workingDirectory: 'profiler/frontend'
  displayName: 'Install and build frontend'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'profiler/frontend/dist'
    ArtifactName: 'frontend-dist'
    publishLocation: 'Container'
  displayName: 'Publish frontend artifact'